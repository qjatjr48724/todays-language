# 참고: Windows에서 gradlew.bat은 gradle.properties보다 먼저 시스템 JAVA_HOME으로 java.exe를 찾는다.
# JAVA_HOME이 없거나 잘못된 경로면 gradlew 자체가 시작되지 않는다(먼저 환경 변수를 고칠 것).
# 아래는 데몬/자식 JVM에 쓸 JDK를 고정할 때 유용하며, flutter doctor의 Java 경로의 상위 폴더(.../jbr)와 맞춘다.
org.gradle.java.home=C:/Program Files/Android/Android Studio1/jbr

# 과도한 힙/메타스페이스는 Windows에서 네이티브 mmap 실패(데몬 소멸)를 유발할 수 있음.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Windows: 프로젝트가 D: 등인데 pub 캐시는 기본 C:\Users\...\Pub\Cache 이면 Kotlin 증분 컴파일이
# "different roots" 로 캐시를 닫지 못해 실패한다. 전체 비증분으로 우회한다.
kotlin.incremental=false
